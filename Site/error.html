<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 | Page Not Found</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .box {
      background: #1e293b;
      padding: 50px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }

    h1 {
      font-size: 64px;
      margin-bottom: 10px;
      color: #ef4444;
    }

    p {
      font-size: 18px;
      margin-bottom: 20px;
    }

    a {
      text-decoration: none;
      color: #38bdf8;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>404</h1>
    <p>Oops... this page doesn't exist.</p>
    <p><a href="/">Go back home</a></p>
  </div>
</body>
</html>
